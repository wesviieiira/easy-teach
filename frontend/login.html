<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Easy Teach — Login e cadastro na plataforma do curso de inglês.">
    <title>Easy Teach — Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪞</text></svg>">
</head>

<body>

    <div class="auth-page">
        <div class="glass auth-card">
            <!-- Logo -->
            <div style="text-align: center; margin-bottom: var(--space-8);">
                <a href="index.html" class="navbar-logo" style="justify-content: center;">
                    <div class="logo-icon">🪞</div>
                    <span>Easy Teach</span>
                </a>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs" id="authTabs">
                <button class="auth-tab active" data-tab="login">Entrar</button>
                <button class="auth-tab" data-tab="register">Criar Conta</button>
            </div>

            <!-- Error / Success messages -->
            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" data-tab="login">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="seu@email.com" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Senha</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <button type="button" class="forgot-password-link" id="forgotPasswordLink">Esqueci minha senha</button>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="loginBtn">
                    Entrar
                </button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm" data-tab="register">
                <div class="form-group">
                    <label class="form-label" for="registerName">Nome Completo</label>
                    <input type="text" class="form-input" id="registerName" placeholder="Seu nome" required
                        autocomplete="name">
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerEmail">Email</label>
                    <input type="email" class="form-input" id="registerEmail" placeholder="seu@email.com" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerPassword">Senha</label>
                    <input type="password" class="form-input" id="registerPassword" placeholder="Mínimo 6 caracteres"
                        required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="registerBtn">
                    Criar Conta
                </button>
            </form>

            <!-- Forgot Password Form -->
            <form class="auth-form" id="forgotForm" data-tab="forgot">
                <p style="color:var(--text-secondary); margin-bottom:var(--space-4); font-size:0.9rem;">
                    Informe seu email e enviaremos instruções para redefinir sua senha.
                </p>
                <div class="form-group">
                    <label class="form-label" for="forgotEmail">Email</label>
                    <input type="email" class="form-input" id="forgotEmail" placeholder="seu@email.com" required
                        autocomplete="email">
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="forgotBtn">
                    Enviar link de recuperação
                </button>
                <button type="button" class="btn btn-ghost" style="width:100%; margin-top:var(--space-3);"
                    id="backToLoginBtn">← Voltar ao login</button>
            </form>

            <!-- Reset Password Form -->
            <form class="auth-form" id="resetForm" data-tab="reset">
                <p style="color:var(--text-secondary); margin-bottom:var(--space-4); font-size:0.9rem;">
                    Defina sua nova senha abaixo.
                </p>
                <div class="form-group">
                    <label class="form-label" for="resetPassword">Nova senha</label>
                    <input type="password" class="form-input" id="resetPassword" placeholder="Mínimo 6 caracteres"
                        required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="resetConfirm">Confirmar nova senha</label>
                    <input type="password" class="form-input" id="resetConfirm" placeholder="Repita a nova senha"
                        required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="resetBtn">
                    Redefinir senha
                </button>
            </form>

            <!-- Back to landing -->
            <div style="text-align: center; margin-top: var(--space-6);">
                <a href="index.html" class="btn btn-ghost" style="font-size: 0.9rem;">
                    ← Voltar para a página inicial
                </a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        const API = window.EasyTeach?.API_URL || (window.__API_URL__ || 'http://localhost:3000');

        function showTab(tabName) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            const tab = document.querySelector(`.auth-tab[data-tab="${tabName}"]`);
            if (tab) tab.classList.add('active');
            document.querySelector(`.auth-form[data-tab="${tabName}"]`).classList.add('active');
            hideError();
            hideSuccess();
            // Hide tabs for forgot/reset views
            document.getElementById('authTabs').style.display =
                (tabName === 'forgot' || tabName === 'reset') ? 'none' : '';
        }

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => showTab(tab.dataset.tab));
        });

        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.classList.add('show');
        }
        function hideError() {
            document.getElementById('authError').classList.remove('show');
        }
        function showSuccess(msg) {
            const el = document.getElementById('authSuccess');
            el.textContent = msg;
            el.classList.add('show');
        }
        function hideSuccess() {
            document.getElementById('authSuccess').classList.remove('show');
        }

        // Forgot/back navigation
        document.getElementById('forgotPasswordLink').addEventListener('click', () => showTab('forgot'));
        document.getElementById('backToLoginBtn').addEventListener('click', () => showTab('login'));

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<span class="spinner"></span>';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                const user = data.data.user;

                // Admin always gets access
                if (user.role === 'admin') {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(user));
                    window.EasyTeach?.showToast?.('Login realizado com sucesso!', 'success');
                    setTimeout(() => { window.location.href = 'admin.html'; }, 500);
                    return;
                }

                // Student: check if paid
                if (!user.paid) {
                    // Redirect to MP checkout without saving token
                    btn.innerHTML = '<span class="spinner"></span> Redirecionando ao pagamento...';
                    try {
                        const payRes = await fetch(`${API}/api/payment/create`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: user.email, name: user.name })
                        });
                        const payData = await payRes.json();
                        if (payData.success && payData.data.checkout_url) {
                            localStorage.removeItem('token');
                            localStorage.removeItem('user');
                            window.location.replace(payData.data.checkout_url);
                            return;
                        }
                    } catch (e) { /* MP not configured */ }
                    showError('Pagamento pendente. Complete o pagamento para acessar a plataforma.');
                    btn.textContent = 'Entrar';
                    btn.disabled = false;
                    return;
                }

                // Paid student — save token and go to dashboard
                localStorage.setItem('token', data.data.token);
                localStorage.setItem('user', JSON.stringify(user));
                window.EasyTeach?.showToast?.('Login realizado com sucesso!', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
            } catch (err) {
                showError(err.message || 'Erro ao fazer login');
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const btn = document.getElementById('registerBtn');
            btn.innerHTML = '<span class="spinner"></span>';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('registerName').value,
                        email: document.getElementById('registerEmail').value,
                        password: document.getElementById('registerPassword').value
                    })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                // If user already paid (came from payment flow), save token and go to dashboard
                const params = new URLSearchParams(window.location.search);
                if (params.get('payment') === 'success') {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    window.EasyTeach?.showToast?.('Conta criada com sucesso!', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
                    return;
                }

                // User hasn't paid — redirect to Mercado Pago (DON'T save token yet)
                btn.innerHTML = '<span class="spinner"></span> Redirecionando ao pagamento...';
                const payRes = await fetch(`${API}/api/payment/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('registerEmail').value,
                        name: document.getElementById('registerName').value
                    })
                });
                const payData = await payRes.json();

                if (payData.success && payData.data.checkout_url) {
                    // Clear any saved token before redirecting
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.replace(payData.data.checkout_url);
                } else {
                    // MP not configured — save token and go to dashboard
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    window.EasyTeach?.showToast?.('Conta criada com sucesso!', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
                }
            } catch (err) {
                showError(err.message || 'Erro ao criar conta');
                btn.textContent = 'Criar Conta';
                btn.disabled = false;
            }
        });

        // Forgot password
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const btn = document.getElementById('forgotBtn');
            btn.innerHTML = '<span class="spinner"></span>';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('forgotEmail').value })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showSuccess(data.data.message);
            } catch (err) {
                showError(err.message || 'Erro ao enviar email');
            } finally {
                btn.textContent = 'Enviar link de recuperação';
                btn.disabled = false;
            }
        });

        // Reset password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const pass = document.getElementById('resetPassword').value;
            const confirm = document.getElementById('resetConfirm').value;
            if (pass !== confirm) { showError('As senhas não conferem'); return; }

            const btn = document.getElementById('resetBtn');
            btn.innerHTML = '<span class="spinner"></span>';
            btn.disabled = true;

            try {
                const urlParams = new URLSearchParams(window.location.search);
                const res = await fetch(`${API}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: urlParams.get('reset_token'), password: pass })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                showSuccess('Senha redefinida! Faça login com sua nova senha.');
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } catch (err) {
                showError(err.message || 'Erro ao redefinir senha');
                btn.textContent = 'Redefinir senha';
                btn.disabled = false;
            }
        });

        // Check URL params on load
        const params = new URLSearchParams(window.location.search);
        if (params.get('reset_token')) {
            showTab('reset');
        } else if (params.get('payment') === 'success') {
            window.EasyTeach?.showToast?.('Pagamento confirmado! Crie sua conta para acessar.', 'success');
            showTab('register');
        } else {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (token && user) {
                window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            }
        }
    </script>
</body>

</html>
