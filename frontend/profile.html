<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Teach — Meu Perfil</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪞</text></svg>">
</head>

<body>
    <div class="profile-page">

        <div class="profile-container">
            <!-- Header -->
            <div class="profile-header">
                <a href="dashboard.html" class="btn btn-ghost profile-back">← Voltar ao dashboard</a>
                <h1 class="profile-title">Meu perfil</h1>
            </div>

            <!-- Avatar section -->
            <div class="profile-card">
                <div class="profile-avatar-section">
                    <div class="profile-avatar" id="profileAvatar">
                        <span class="profile-avatar-initials" id="avatarInitials">?</span>
                        <img class="profile-avatar-img" id="avatarImg" src="" alt="" style="display:none;">
                        <label class="profile-avatar-overlay" for="avatarInput">
                            📷 Alterar foto
                        </label>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none;">
                    <p class="profile-avatar-hint">Clique na foto para alterar</p>
                </div>
            </div>

            <!-- Profile info form -->
            <div class="profile-card">
                <h2 class="profile-card-title">Informações pessoais</h2>
                <form id="profileForm">
                    <div class="form-group">
                        <label class="form-label" for="profileName">Nome</label>
                        <input type="text" class="form-input" id="profileName" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profileAge">Idade</label>
                        <input type="number" class="form-input" id="profileAge" placeholder="Sua idade" min="10"
                            max="120">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profileEmail">Email</label>
                        <input type="email" class="form-input" id="profileEmail" disabled
                            style="opacity:0.5;cursor:not-allowed;">
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveProfileBtn">Salvar alterações</button>
                </form>
            </div>

            <!-- Password change form -->
            <div class="profile-card">
                <h2 class="profile-card-title">Alterar senha</h2>
                <form id="passwordForm">
                    <div class="form-group">
                        <label class="form-label" for="currentPassword">Senha atual</label>
                        <input type="password" class="form-input" id="currentPassword" placeholder="••••••••" required
                            minlength="6" autocomplete="current-password">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="newPassword">Nova senha</label>
                        <input type="password" class="form-input" id="newPassword" placeholder="Mínimo 6 caracteres"
                            required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">Confirmar nova senha</label>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="Repita a nova senha"
                            required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary" id="changePasswordBtn">Alterar senha</button>
                </form>
            </div>

            <!-- Account info -->
            <div class="profile-card profile-card-muted">
                <p>Membro desde: <strong id="memberSince">—</strong></p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
